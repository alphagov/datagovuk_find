name: Build and push DGU Find Image on tags

on:
  workflow_dispatch:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  build_and_push:
    name: Build and push the DGU Find Image w/ tags
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: ./.github/workflows/build-image.yaml
    with:
      buildType: build_push_with_gittag
      gitRef: ${{ github.ref_name }}
  notify-slack-if-failure-on-main:
    if: ${{ failure() }}
    needs: [build_and_push]
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack if failure
        uses: alphagov/govuk-infrastructure/.github/actions/report-run-failure@main
        with:
          slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          channel: "datagovuk-technical"
          message: "datagovuk_find build-image-on-tags workflow failed"
